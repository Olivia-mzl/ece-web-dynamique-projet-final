<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmnesEvent - Inscription</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ===== EN-TÊTE COMMUN ===== -->
    <header>
        <div class="logo">
            <a href="index.html"><strong>OmnesEvent</strong></a>
        </div>
        <nav>
            <button id="menu-burger" aria-label="Ouvrir le menu">☰</button>
            <ul id="menu-principal">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="events.html">Événements</a></li>
                <li><a href="profile.html">Mon profil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html">Connexion</a></li>
                <li><a href="register.html">Inscription</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="form-container">

            <h1>Inscription</h1>

            <form action="#" method="post">

                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required>

                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required>

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>

                <label for="login">Login :</label>
                <input type="text" id="login" name="login" required>

                <label for="mot_de_passe">Mot de passe :</label>
                <input type="password" id="mot_de_passe" name="mot_de_passe" required>

                <label for="confirmation">Confirmer le mot de passe :</label>
                <input type="password" id="confirmation" name="confirmation" required>

                <fieldset>
                    <legend>Type de compte :</legend>
                    <label>
                        <input type="radio" name="role" value="participant" checked>
                        Participant (étudiant ou personnel)
                    </label>
                    <label>
                        <input type="radio" name="role" value="organisateur">
                        Organisateur (représentant d'association) - demande à valider
                    </label>
                </fieldset>

                <button type="submit" class="btn-primary">Créer mon compte</button>

            </form>

            <p>Déjà inscrit ? <a href="login.html">Connecte-toi ici</a></p>

        </section>

    </main>

    <!-- ===== PIED DE PAGE COMMUN ===== -->
    <footer>
        <p>&copy; 2026 OmnesEvent - Projet ING2</p>
        <ul>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#">Mentions légales</a></li>
        </ul>
    </footer>


<!-- jQuery via CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Notre script -->
    <script src="assets/js/script.js"></script>
</body>
</html>
